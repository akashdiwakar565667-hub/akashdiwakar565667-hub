```html
<!DOCTYPE html>
<html>
<head>
<title>Interior View Racing</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
font-family:Arial;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
}

#game{
width:400px;
height:600px;
margin:auto;
background:#444;
position:relative;
overflow:hidden;
}

#road{
position:absolute;
width:200px;
height:600px;
left:100px;
background:linear-gradient(#555,#777);
}

.line{
position:absolute;
width:10px;
height:80px;
background:white;
left:195px;
}

.enemy{
position:absolute;
width:40px;
height:70px;
background:red;
top:-100px;
}

#dashboard{
position:absolute;
bottom:0;
width:100%;
height:170px;
background:#000;
display:flex;
justify-content:center;
align-items:center;
}

#steering{
width:120px;
height:120px;
border:10px solid #888;
border-radius:50%;
position:relative;
}

#steering:after{
content:'';
position:absolute;
width:10px;
height:60px;
background:#888;
left:50%;
top:10px;
transform:translateX(-50%);
}

</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="game">

<div id="road"></div>

<div id="dashboard">
<div id="steering"></div>
</div>

</div>

<script>

let game=document.getElementById("game");
let steering=document.getElementById("steering");

let speed=6;
let score=0;
let lane=1;

let lanes=[140,180,220];

document.addEventListener("keydown",control);

function control(e){

if(e.key==="ArrowLeft" && lane>0){
lane--;
steering.style.transform="rotate(-30deg)";
setTimeout(()=>steering.style.transform="rotate(0deg)",200);
}

if(e.key==="ArrowRight" && lane<2){
lane++;
steering.style.transform="rotate(30deg)";
setTimeout(()=>steering.style.transform="rotate(0deg)",200);
}

}

for(let i=0;i<6;i++){
let line=document.createElement("div");
line.classList.add("line");
line.style.top=(i*120)+"px";
game.appendChild(line);
}

function moveLines(){

let lines=document.querySelectorAll(".line");

lines.forEach(function(line){

let top=parseInt(line.style.top);

top+=speed;

if(top>600) top=-100;

line.style.top=top+"px";

});

}

function createEnemy(){

let enemy=document.createElement("div");
enemy.classList.add("enemy");

enemy.style.left=lanes[Math.floor(Math.random()*3)]+"px";

game.appendChild(enemy);

}

function moveEnemy(){

let enemies=document.querySelectorAll(".enemy");

enemies.forEach(function(enemy){

let top=enemy.offsetTop;

top+=speed;

enemy.style.top=top+"px";

let enemyLane=lanes.indexOf(parseInt(enemy.style.left));

if(top>400 && enemyLane===lane){

alert("💥 Crash! Score: "+score);
location.reload();

}

if(top>600){

enemy.remove();

score++;

speed+=0.2;

document.getElementById("score").innerText="Score: "+score;

}

});

}

function gameLoop(){

moveLines();
moveEnemy();

requestAnimationFrame(gameLoop);

}

setInterval(createEnemy,1400);

gameLoop();

</script>

</body>
</html>
