<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aodikhau</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

header{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#ff2c2c;
  letter-spacing:2px;
  box-shadow:0 0 10px red;
}

.search-box{
  text-align:center;
  margin:30px;
}

.search-box input{
  padding:12px;
  width:300px;
  border-radius:25px;
  border:none;
  outline:none;
}

.search-box button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  background:red;
  color:white;
  cursor:pointer;
  margin-left:10px;
  transition:0.3s;
}

.search-box button:hover{
  background:#ff5555;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
  cursor:pointer;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px red;
}

.card-title{
  padding:10px;
  text-align:center;
}

footer{
  text-align:center;
  padding:15px;
  background:#000;
  color:#aaa;
}

</style>
</head>

<body>

<header>aodikhau</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search movies or anime...">
  <button onclick="searchContent()">Search</button>
</div>

<div class="grid">

<div class="card" onclick="play('naruto')">
  <img src="https://cdn.myanimelist.net/images/anime/13/17405.jpg">
  <div class="card-title">Naruto (Hindi Dub)</div>
</div>

<div class="card" onclick="play('attack on titan')">
  <img src="https://cdn.myanimelist.net/images/anime/10/47347.jpg">
  <div class="card-title">Attack on Titan (Hindi)</div>
</div>

<div class="card" onclick="play('one piece')">
  <img src="https://cdn.myanimelist.net/images/anime/6/73245.jpg">
  <div class="card-title">One Piece (Hindi)</div>
</div>

<div class="card" onclick="play('dragon ball super')">
  <img src="https://cdn.myanimelist.net/images/anime/7/74606.jpg">
  <div class="card-title">Dragon Ball Super (Hindi)</div>
</div>

<div class="card" onclick="play('demon slayer')">
  <img src="https://cdn.myanimelist.net/images/anime/1286/99889.jpg">
  <div class="card-title">Demon Slayer (Hindi)</div>
</div>

<div class="card" onclick="play('jujutsu kaisen')">
  <img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg">
  <div class="card-title">Jujutsu Kaisen (Hindi)</div>
</div>

</div>

<footer>© 2026 aodikhau | Free Hindi Dubbed Content</footer>

<script>
function searchContent(){
  let query = document.getElementById('searchInput').value;
  if(query.trim() !== ""){
    window.location.href = "https://watch-v2.autoembed.app/?q=" + encodeURIComponent(query);
  }
}

function play(title){
  window.location.href = "https://watch-v2.autoembed.app/?q=" + encodeURIComponent(title);
}
</script>

</body>
</html>
