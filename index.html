<!DOCTYPE html>
<html>
<head>
<title>StreamFlix Anime</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
color:red;
font-size:32px;
padding:15px;
font-weight:bold;
}

.searchBox{
text-align:center;
margin-top:25px;
}

.searchBox input{
padding:12px;
width:300px;
font-size:16px;
border:none;
border-radius:6px;
outline:none;
}

.searchBox button{
padding:12px 20px;
font-size:16px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:8px;
}

h2{
padding-left:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:18px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:8px;
cursor:pointer;
transition:0.3s;
text-align:center;
overflow:hidden;
}

.card:hover{
transform:scale(1.07);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:15px;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:40px;
}

</style>

</head>

<body>

<header>STREAMFLIX</header>

<div class="searchBox">

<input id="searchInput" placeholder="Search any anime...">
<button onclick="searchAnime()">Search</button>

</div>

<h2>Top Anime</h2>

<div class="container" id="anime"></div>

<footer>StreamFlix Anime Library</footer>

<script>

function searchAnime(){
let q=document.getElementById("searchInput").value
if(q!=""){
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(q)
}
}

document.getElementById("searchInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchAnime()
}
})

const animeList=[

"Naruto","Naruto Shippuden","One Piece","Attack on Titan","Demon Slayer",
"Jujutsu Kaisen","Death Note","Dragon Ball","Dragon Ball Z","Dragon Ball Super",
"Fullmetal Alchemist Brotherhood","Tokyo Ghoul","Hunter x Hunter",
"Black Clover","Bleach","Chainsaw Man","My Hero Academia","Spy x Family",
"Vinland Saga","Solo Leveling","Blue Lock","Haikyuu","Steins Gate",
"Code Geass","Mob Psycho 100","One Punch Man","Re Zero","Fairy Tail",
"Sword Art Online","Dr Stone","Akame ga Kill","Gintama","Boruto",
"Tokyo Revengers","Fire Force","No Game No Life","Overlord","Parasyte",
"Assassination Classroom","Great Teacher Onizuka","JoJo Bizarre Adventure",
"Cowboy Bebop","Neon Genesis Evangelion","Psycho Pass","Bungo Stray Dogs",
"Made in Abyss","Kuroko no Basket","Food Wars","Seven Deadly Sins"

]

const container=document.getElementById("anime")

animeList.forEach(anime=>{

fetch("https://api.jikan.moe/v4/anime?q="+encodeURIComponent(anime)+"&limit=1")
.then(res=>res.json())
.then(data=>{

let img=data.data[0]?.images?.jpg?.image_url || ""

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${img}">
<h3>${anime}</h3>
`

card.onclick=()=>{
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(anime)
}

container.appendChild(card)

})

})

</script>

</body>
</html>
